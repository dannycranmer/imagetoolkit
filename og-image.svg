<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC"/>
      <stop offset="100%" style="stop-color:#EFF6FF"/>
    </linearGradient>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#heroGrad)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="180" fill="#3B82F6" opacity="0.04"/>
  <circle cx="1100" cy="80" r="120" fill="#3B82F6" opacity="0.06"/>
  <circle cx="150" cy="550" r="150" fill="#10B981" opacity="0.04"/>
  <circle cx="100" cy="580" r="100" fill="#10B981" opacity="0.06"/>

  <!-- Decorative dots pattern (top right) -->
  <g opacity="0.08" fill="#3B82F6">
    <circle cx="950" cy="40" r="3"/><circle cx="975" cy="40" r="3"/><circle cx="1000" cy="40" r="3"/><circle cx="1025" cy="40" r="3"/><circle cx="1050" cy="40" r="3"/>
    <circle cx="950" cy="65" r="3"/><circle cx="975" cy="65" r="3"/><circle cx="1000" cy="65" r="3"/><circle cx="1025" cy="65" r="3"/><circle cx="1050" cy="65" r="3"/>
    <circle cx="950" cy="90" r="3"/><circle cx="975" cy="90" r="3"/><circle cx="1000" cy="90" r="3"/><circle cx="1025" cy="90" r="3"/><circle cx="1050" cy="90" r="3"/>
  </g>

  <!-- Logo icon -->
  <rect x="70" y="50" width="60" height="60" rx="16" fill="url(#heroGrad)"/>
  <text x="87" y="91" font-family="Arial,Helvetica,sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF">P</text>

  <!-- Brand name -->
  <text x="148" y="94" font-family="Arial,Helvetica,sans-serif" font-size="52" font-weight="bold" fill="#1E293B">Pic</text>
  <text x="232" y="94" font-family="Arial,Helvetica,sans-serif" font-size="52" font-weight="bold" fill="#3B82F6">Brew</text>

  <!-- Main headline -->
  <text x="70" y="200" font-family="Arial,Helvetica,sans-serif" font-size="80" font-weight="bold" fill="#1E293B">17 Free Image</text>
  <text x="70" y="290" font-family="Arial,Helvetica,sans-serif" font-size="80" font-weight="bold" fill="#1E293B">Tools</text>

  <!-- Privacy badge -->
  <rect x="70" y="320" width="580" height="52" rx="26" fill="url(#greenGrad)"/>
  <!-- Shield icon -->
  <g transform="translate(88, 330)">
    <path d="M12 0L24 6V14C24 21 18.5 27 12 29C5.5 27 0 21 0 14V6L12 0Z" fill="#FFFFFF" opacity="0.3"/>
    <path d="M10 18L6 14L7.5 12.5L10 15L17 8L18.5 9.5L10 18Z" fill="#FFFFFF"/>
  </g>
  <text x="122" y="354" font-family="Arial,Helvetica,sans-serif" font-size="21" font-weight="bold" fill="#FFFFFF">Privacy-First  |  Images Never Leave Your Device</text>

  <!-- Tool pills - Row 1 (blue) -->
  <rect x="70" y="400" width="130" height="42" rx="21" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="135" y="427" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#2563EB" text-anchor="middle">Compress</text>

  <rect x="212" y="400" width="105" height="42" rx="21" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="264" y="427" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#2563EB" text-anchor="middle">Resize</text>

  <rect x="329" y="400" width="115" height="42" rx="21" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="386" y="427" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#2563EB" text-anchor="middle">Convert</text>

  <rect x="456" y="400" width="90" height="42" rx="21" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="501" y="427" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#2563EB" text-anchor="middle">Crop</text>

  <rect x="558" y="400" width="140" height="42" rx="21" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="628" y="427" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#2563EB" text-anchor="middle">Watermark</text>

  <rect x="710" y="400" width="105" height="42" rx="21" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="762" y="427" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#2563EB" text-anchor="middle">Filters</text>

  <rect x="827" y="400" width="110" height="42" rx="21" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="882" y="427" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#2563EB" text-anchor="middle">Collage</text>

  <!-- Row 2 (green) -->
  <rect x="70" y="452" width="120" height="42" rx="21" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="130" y="479" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#059669" text-anchor="middle">QR Code</text>

  <rect x="202" y="452" width="100" height="42" rx="21" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="252" y="479" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#059669" text-anchor="middle">Meme</text>

  <rect x="314" y="452" width="105" height="42" rx="21" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="366" y="479" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#059669" text-anchor="middle">Base64</text>

  <rect x="431" y="452" width="130" height="42" rx="21" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="496" y="479" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#059669" text-anchor="middle">EXIF Data</text>

  <rect x="573" y="452" width="140" height="42" rx="21" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="643" y="479" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#059669" text-anchor="middle">Flip / Rotate</text>

  <rect x="725" y="452" width="115" height="42" rx="21" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="782" y="479" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#059669" text-anchor="middle">Overlay</text>

  <!-- Row 3 (indigo) -->
  <rect x="70" y="504" width="150" height="42" rx="21" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="145" y="531" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#4F46E5" text-anchor="middle">Color Picker</text>

  <rect x="232" y="504" width="150" height="42" rx="21" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="307" y="531" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#4F46E5" text-anchor="middle">Batch Resize</text>

  <rect x="394" y="504" width="155" height="42" rx="21" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="471" y="531" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#4F46E5" text-anchor="middle">ICO Converter</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#1E293B"/>
  <text x="600" y="618" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">picbrew.org</text>

  <!-- Right side decorative element - stacked image cards -->
  <g transform="translate(920, 140)">
    <!-- Back card -->
    <rect x="30" y="30" width="180" height="130" rx="12" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
    <!-- Middle card -->
    <rect x="15" y="15" width="180" height="130" rx="12" fill="#E0F2FE" stroke="#7DD3FC" stroke-width="2"/>
    <!-- Front card -->
    <rect x="0" y="0" width="180" height="130" rx="12" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2"/>
    <!-- Image icon on front card -->
    <rect x="20" y="20" width="140" height="90" rx="8" fill="#EFF6FF"/>
    <!-- Mountain scene -->
    <polygon points="40,90 80,45 120,90" fill="#3B82F6" opacity="0.35"/>
    <polygon points="85,90 115,55 155,90" fill="#10B981" opacity="0.45"/>
    <!-- Sun -->
    <circle cx="130" cy="38" r="14" fill="#FBBF24" opacity="0.7"/>
  </g>
</svg>